name: Proxy CD

on:
  workflow_call:

env:
  REGION: "us-central1"
  IMAGE_NAME: "${{ github.event.repository.name }}-proxy"
  SERVICE_NAME: "${{ github.event.repository.name }}-proxy"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v3

      - name: Authenticate to Google Cloud
        id: auth
        uses: 'google-github-actions/auth@v3'
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
          project_id: ${{ secrets.PROJECT_ID }}
          token_format: 'access_token'

      - name: Docker Auth to GCP
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Build and Push Image
        uses: docker/build-push-action@v7
        with:
          context: ./proxy
          file: ./proxy/Dockerfile
          push: true
          tags: ${{ secrets.GAR_REPO_URL }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ secrets.GAR_REPO_URL }}/${{ env.IMAGE_NAME }}:latest

      - run: echo "Deployed Proxy URL ${{ steps.deploy.outputs.url }}"
